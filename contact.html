<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Sonal Notes Hub</title>

<style>
:root{
  --bg:#0b1120;
  --card:#111827;
  --text:#e5e7eb;
  --accent:#3b82f6;
  --border:rgba(255,255,255,0.08);
  --glass:rgba(255,255,255,0.05);
}

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 25px;
  background:var(--glass);
  border-bottom:1px solid var(--border);
}

.title{
  font-size:22px;
  font-weight:700;
  color:#60a5fa;
}

.back{
  padding:8px 16px;
  background:#3b82f6;
  color:white;
  text-decoration:none;
  border-radius:20px;
  font-weight:600;
}

/* CONTAINER */
.container{
  max-width:800px;
  margin:60px auto;
  padding:0 20px;
  text-align:center;
}

h1{
  font-size:32px;
  margin-bottom:10px;
  color:#60a5fa;
}

p{
  opacity:0.8;
  margin-bottom:30px;
}

/* CARD */
.contact-card{
  background:var(--card);
  padding:30px;
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* BUTTONS */
.contact-btn{
  display:block;
  margin:12px auto;
  width:100%;
  max-width:300px;
  padding:14px;
  border-radius:30px;
  text-decoration:none;
  font-weight:600;
  font-size:16px;
  color:white;
  transition:0.3s;
}

.email{background:#3b82f6;}
.whatsapp{background:#22c55e;}
.telegram{background:#0ea5e9;}

.contact-btn:hover{
  transform:translateY(-3px);
  opacity:0.95;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  color:#94a3b8;
  padding:20px 0;
  border-top:1px solid rgba(255,255,255,0.06);
  margin-top:60px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="title">📞 Contact Us</div>
  <a href="index.html" class="back">⬅ Home</a>
</div>

<div class="container">
  <h1>Get in Touch</h1>
  <p>If you need notes, assignments, or have any issue with downloads, contact me below.</p>

  <div class="contact-card">

    <!-- EMAIL -->
    <a class="contact-btn email" href="mailto:sonal.infosec@gmail.com">
      📧 Email: sonal.infosec@gmail.com
    </a>

    <!-- WHATSAPP (CHANGE NUMBER) -->
    <a class="contact-btn whatsapp" 
       href="https://wa.me/9582874935" target="_blank">
       💬 Chat on WhatsApp
    </a>

    <!-- TELEGRAM (OPTIONAL) -->
    <a class="contact-btn telegram" href="#" target="_blank">
      📢 Join Telegram Channel
    </a>

  </div>
</div>

<footer class="footer">
  © 2026 Sonal Notes Hub — Contact Support 📚
</footer>

</body>
</html>
