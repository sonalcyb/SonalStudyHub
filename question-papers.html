<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question Papers - Sonal Notes Hub</title>

<style>
:root{
  --bg:#0b1120;
  --text:#e5e7eb;
  --accent:#3b82f6;
  --accent2:#22c55e;
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
}

body.light{
  --bg:#f4f7fb;
  --text:#111827;
  --glass: rgba(0,0,0,0.04);
  --border: rgba(0,0,0,0.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  transition:0.3s ease;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 25px;
  background:var(--glass);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}

.title{
  font-size:22px;
  font-weight:700;
  color:#60a5fa;
}

.top-actions{
  display:flex;
  gap:10px;
}

.back{
  padding:8px 16px;
  background:var(--accent);
  color:white;
  text-decoration:none;
  border-radius:20px;
  font-weight:600;
}

.toggle{
  padding:8px 16px;
  border:none;
  border-radius:20px;
  background:linear-gradient(135deg,#3b82f6,#22c55e);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* HEADING */
.heading{
  text-align:center;
  font-size:28px;
  margin:30px 10px;
  color:#60a5fa;
}

/* GRID */
.wrapper{
  max-width:1300px;
  margin:auto;
  padding:20px;
}

.container{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:24px;
}

@media(max-width:1200px){
  .container{grid-template-columns:repeat(3,1fr);}
}

@media(max-width:900px){
  .container{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:500px){
  .container{grid-template-columns:repeat(1,1fr);}
}

/* CARD */
.card{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  transition:0.3s;
  backdrop-filter:blur(8px);
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:12px;
}

.title-text{
  margin:12px 0;
  font-weight:600;
  color:#60a5fa;
}

.btn-group{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  text-align:center;
  padding:9px;
  border-radius:20px;
  text-decoration:none;
  color:white;
  font-weight:600;
  font-size:14px;
}

.preview{background:#22c55e;}
.download{background:#3b82f6;}
</style>
</head>
<body>

<div class="header">
  <div class="title">📄 Question Papers</div>
  <div class="top-actions">
    <a href="index.html" class="back">⬅ Home</a>
    <button class="toggle" onclick="toggleTheme()">🌗 Theme</button>
  </div>
</div>

<h2 class="heading">Previous Year Question Papers</h2>

<div class="wrapper">
  <div class="container">

    <div class="card">
      <img src="images/qp1.jpg" class="img">
      <div class="title-text">Maths Question Paper 2024</div>
      <div class="btn-group">
        <a class="btn preview" href="#" target="_blank">👀 Preview</a>
        <a class="btn download" href="#">📥 Download</a>
      </div>
    </div>

    <div class="card">
      <img src="images/qp2.jpg" class="img">
      <div class="title-text">C Programming Question Paper</div>
      <div class="btn-group">
        <a class="btn preview" href="#" target="_blank">👀 Preview</a>
        <a class="btn download" href="#">📥 Download</a>
      </div>
    </div>

  </div>
</div>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
