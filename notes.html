<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes - Sonal Notes Hub</title>

<style>
:root{
  --bg:#0b1120;
  --card:#111827;
  --text:#e5e7eb;
  --accent:#3b82f6;
  --accent2:#22c55e;
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
}

/* LIGHT MODE */
body.light{
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#111827;
  --glass: rgba(0,0,0,0.04);
  --border: rgba(0,0,0,0.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Segoe UI", sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  transition:0.3s ease;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 25px;
  background:var(--glass);
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--border);
}

.title{
  font-size:22px;
  font-weight:700;
  color:#60a5fa;
}

/* BUTTONS TOP */
.top-actions{
  display:flex;
  gap:10px;
}

.back{
  padding:8px 16px;
  background:var(--accent);
  color:white;
  text-decoration:none;
  border-radius:20px;
  font-weight:600;
  font-size:14px;
}

.toggle{
  padding:8px 16px;
  border:none;
  border-radius:20px;
  background:linear-gradient(135deg,#3b82f6,#22c55e);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* PAGE HEADING */
.page-heading{
  text-align:center;
  font-size:28px;
  margin:30px 15px 10px;
  color:#60a5fa;
}

/* MAIN CONTAINER */
.wrapper{
  max-width:1300px;
  margin:auto;
  padding:20px;
}

/* RESPONSIVE GRID */
.container{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:24px;
}

/* LARGE TABLET */
@media (max-width: 1200px){
  .container{
    grid-template-columns: repeat(3, 1fr);
  }
}

/* TABLET */
@media (max-width: 900px){
  .container{
    grid-template-columns: repeat(2, 1fr);
  }
}

/* MOBILE */
@media (max-width: 500px){
  .container{
    grid-template-columns: repeat(1, 1fr);
    gap:18px;
  }

  .page-heading{
    font-size:22px;
  }
}

/* NOTE CARD */
.note-box{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  transition:0.3s ease;
  backdrop-filter: blur(8px);
}

.note-box:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* IMAGE */
.note-img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:12px;
}

/* TITLE */
.note-title{
  margin:12px 0 10px;
  font-size:16px;
  font-weight:600;
  color:#60a5fa;
}

/* BUTTON GROUP */
.btn-group{
  display:flex;
  gap:10px;
}

/* BUTTON STYLE */
.btn{
  flex:1;
  text-align:center;
  padding:9px;
  border-radius:20px;
  text-decoration:none;
  font-weight:600;
  font-size:14px;
  color:white;
}

.preview{
  background:#22c55e;
}

.download{
  background:#3b82f6;
}

.btn:hover{
  opacity:0.9;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="title">📚 Sonal Notes Hub</div>
  <div class="top-actions">
    <a href="index.html" class="back">⬅ Home</a>
    <button class="toggle" onclick="toggleTheme()">🌗 Theme</button>
  </div>
</div>

<h2 class="page-heading">All Notes (Preview + Direct Download)</h2>

<div class="wrapper">
  <div class="container">

    <!-- NOTE 1 -->
    <div class="note-box">
      <img src="images/notes-cover.jpg" class="note-img" alt="Notes">
      <div class="note-title">My Study Notes (PDF)</div>
      <div class="btn-group">
        <a class="btn preview"
           href="https://drive.google.com/file/d/1mH_EAsGD_cI0gz2yK1t06IAiqhvgEBV2/preview"
           target="_blank">👀 Preview</a>

        <a class="btn download"
           href="https://drive.google.com/uc?export=download&id=1mH_EAsGD_cI0gz2yK1t06IAiqhvgEBV2">
           📥 Download
        </a>
      </div>
    </div>

    <!-- NOTE 2 -->
    <div class="note-box">
      <img src="images/notes2.jpg" class="note-img" alt="Notes">
      <div class="note-title">Second Notes PDF</div>
      <div class="btn-group">
        <a class="btn preview"
           href="https://drive.google.com/file/d/1mH_EAsGD_cI0gz2yK1t06IAiqhvgEBV2/preview"
           target="_blank">👀 Preview</a>

        <a class="btn download"
           href="https://drive.google.com/uc?export=download&id=1mH_EAsGD_cI0gz2yK1t06IAiqhvgEBV2">
           📥 Download
        </a>
      </div>
    </div>

  </div>
</div>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
