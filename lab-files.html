<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Files - Sonal Study Hub</title>

<style>
:root{
  --bg:#0b1120;
  --card:#111827;
  --text:#e5e7eb;
  --accent:#3b82f6;
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
}

/* LIGHT MODE */
body.light{
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#111827;
  --glass: rgba(0,0,0,0.04);
  --border: rgba(0,0,0,0.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 25px;
  background:var(--glass);
  border-bottom:1px solid var(--border);
}

.title{
  font-size:22px;
  font-weight:700;
  color:#60a5fa;
}

.actions{
  display:flex;
  gap:10px;
}

.btn-top{
  padding:8px 16px;
  border-radius:20px;
  border:none;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  color:white;
  background:linear-gradient(135deg,#3b82f6,#22c55e);
}

/* SECTION */
.section{
  max-width:1300px;
  margin:40px auto;
  padding:0 20px;
}

.section-title{
  font-size:26px;
  margin-bottom:20px;
  color:#60a5fa;
  border-left:5px solid #3b82f6;
  padding-left:12px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:24px;
}

@media(max-width:1100px){
  .grid{grid-template-columns:repeat(3,1fr);}
}

@media(max-width:800px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:500px){
  .grid{grid-template-columns:1fr;}
}

/* CARD */
.card{
  background:var(--card);
  border-radius:18px;
  padding:15px;
  border:1px solid var(--border);
  transition:0.3s ease;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 12px 30px rgba(0,0,0,0.4);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:12px;
}

.card-title{
  margin:12px 0;
  font-size:16px;
  font-weight:600;
  color:#93c5fd;
}

/* BUTTONS */
.btn-group{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:20px;
  text-decoration:none;
  color:white;
  font-size:14px;
  font-weight:600;
}

.preview{background:#22c55e;}
.download{background:#3b82f6;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="title">🧪 Lab Files - Sonal Study Hub</div>
  <div class="actions">
    <a href="index.html" class="btn-top">⬅ Home</a>
    <button class="btn-top" onclick="toggleTheme()">🌗 Theme</button>
  </div>
</div>

<!-- 💻 COMPUTER LAB FILES -->
<div class="section">
  <div class="section-title">💻 Computer Lab Files</div>
  <div class="grid">

    <div class="card">
      <img src="images/lab.jpg" alt="Lab File">
      <div class="card-title">Computer Lab File (Complete PDF)</div>
      <div class="btn-group">
        <a class="btn preview"
           href="https://drive.google.com/file/d/YOUR_ID/preview"
           target="_blank">👀 Preview</a>
        <a class="btn download"
           href="https://drive.google.com/uc?export=download&id=YOUR_ID">
           📥 Download
        </a>
      </div>
    </div>

  </div>
</div>

<!-- 🌐 HTML & CSS LAB FILES -->
<div class="section">
  <div class="section-title">🌐 HTML & CSS Lab Files</div>
  <div class="grid">

    <div class="card">
      <img src="images/lab.jpg" alt="Lab File">
      <div class="card-title">HTML & CSS Lab Manual PDF</div>
      <div class="btn-group">
        <a class="btn preview"
           href="https://drive.google.com/file/d/YOUR_ID/preview"
           target="_blank">👀 Preview</a>
        <a class="btn download"
           href="https://drive.google.com/uc?export=download&id=YOUR_ID">
           📥 Download
        </a>
      </div>
    </div>

  </div>
</div>

<!-- ⚡ BEE LAB FILES -->
<div class="section">
  <div class="section-title">⚡ BEE Lab Files</div>
  <div class="grid">

    <div class="card">
      <img src="images/lab.jpg" alt="Lab File">
      <div class="card-title">BEE Practical Lab File PDF</div>
      <div class="btn-group">
        <a class="btn preview"
           href="https://drive.google.com/file/d/YOUR_ID/preview"
           target="_blank">👀 Preview</a>
        <a class="btn download"
           href="https://drive.google.com/uc?export=download&id=YOUR_ID">
           📥 Download
        </a>
      </div>
    </div>

  </div>
</div>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
